---
name: Deploy blog.terrac.com

on:
  workflow_dispatch:
    inputs:
      git_branch:
        description: "Git branch to deploy"
        required: false
        default: "main"
        type: string

  repository_dispatch:
    types: [deploy-blog-website]

env:
  ANSIBLE_FORCE_COLOR: "true"
  ANSIBLE_HOST_KEY_CHECKING: "false"

jobs:
  deploy:
    name: Deploy blog.terrac.com Hugo Blog
    runs-on: [self-hosted, homelab, ansible]
    environment: Github Actions CI
    steps:
      - name: Checkout homelab repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python3 -m pip install --user --quiet ansible
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup vault password
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          echo "$ANSIBLE_VAULT_PASSWORD" > /tmp/.vault_pass
          chmod 600 /tmp/.vault_pass

      - name: Determine deployment parameters
        id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_BRANCH: ${{ github.event.client_payload.branch }}
          PAYLOAD_SHA: ${{ github.event.client_payload.sha }}
          PAYLOAD_MSG: ${{ github.event.client_payload.commit_message }}
          INPUT_BRANCH: ${{ inputs.git_branch }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            BRANCH="${PAYLOAD_BRANCH:-main}"
            COMMIT_SHA="${PAYLOAD_SHA:-unknown}"
            COMMIT_MESSAGE="${PAYLOAD_MSG:-Webhook deployment}"
          else
            BRANCH="${INPUT_BRANCH:-main}"
            COMMIT_SHA="unknown"
            COMMIT_MESSAGE="Manual deployment"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          {
            echo "commit_message<<COMMIT_MSG_EOF"
            printf '%s\n' "$COMMIT_MESSAGE"
            echo "COMMIT_MSG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run deployment playbook
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ansible-playbook \
            -i inventories/production/hosts.ini \
            --vault-password-file=/tmp/.vault_pass \
            -e git_branch=${{ steps.params.outputs.branch }} \
            playbooks/individual/ocean/services/blog_terrac_com_static.yaml

      - name: Cleanup vault password
        if: always()
        run: rm -f /tmp/.vault_pass

      - name: Post-deployment health check
        if: success()
        run: |
          sleep 3
          if ssh -o StrictHostKeyChecking=no terrac@192.168.1.143 "test -f /data01/services/blog_terrac_com/index.html"; then
            echo "index.html exists on server"
          else
            echo "index.html NOT FOUND"
            exit 1
          fi
