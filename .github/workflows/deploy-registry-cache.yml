---
name: Deploy registry-cache

concurrency:
  group: deploy-registry-cache
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      git_branch:
        description: "Homelab branch to deploy from"
        required: false
        default: "master"
        type: string

  repository_dispatch:
    types: [deploy-registry-cache]

env:
  ANSIBLE_FORCE_COLOR: "true"
  ANSIBLE_HOST_KEY_CHECKING: "false"

jobs:
  deploy:
    name: Deploy registry-cache
    runs-on: [self-hosted, homelab, ansible]
    environment: Github Actions CI
    steps:
      - name: Checkout homelab repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python3 -m pip install --user --quiet ansible
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Ansible installation
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ansible --version

      - name: Setup vault password
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          echo "$ANSIBLE_VAULT_PASSWORD" > /tmp/.vault_pass
          chmod 600 /tmp/.vault_pass

      - name: Run registry-cache playbook
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"

          INVENTORY="inventories/production/hosts.ini"
          PLAYBOOK="playbooks/individual/infrastructure/registry_cache.yaml"

          echo "================================================"
          echo "Deploying registry-cache"
          echo "================================================"

          START_TIME=$(date +%s)
          ansible-playbook -i "$INVENTORY" --vault-password-file=/tmp/.vault_pass "$PLAYBOOK"
          ANSIBLE_EXIT=$?
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          if [ "$ANSIBLE_EXIT" -eq 0 ]; then
            echo "✅ SUCCESS: registry-cache deployed (${DURATION}s)"
          else
            echo "❌ FAILED: registry-cache deployment failed (${DURATION}s)"
            exit 1
          fi

      - name: Cleanup vault password
        if: always()
        run: rm -f /tmp/.vault_pass
