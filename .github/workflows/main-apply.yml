---
name: Main - Apply Playbooks to Production

on:
  push:
    branches:
      - main
      - master
    paths:
      - "playbooks/**/*.yaml"
      - "playbooks/**/*.yml"
      - "files/**"
      - "roles/**"
      - "vars/**/*.yaml"
      - "group_vars/**"
  workflow_dispatch:
    inputs:
      playbooks:
        description: "Comma-separated playbook paths to apply (e.g. playbooks/individual/ocean/monitoring/unpoller.yaml). Use for vault-only fixes or any redeploy not picked up by the push path filter."
        required: true
        type: string
      extra_vars:
        description: "Optional ansible --extra-vars (e.g. 'terminalbench_n_tasks=1' or 'key1=v1 key2=v2'). Applied to every playbook in this dispatch."
        required: false
        type: string
        default: ""

env:
  ANSIBLE_FORCE_COLOR: "true"
  ANSIBLE_HOST_KEY_CHECKING: "false"
  PIP_BREAK_SYSTEM_PACKAGES: "1"

jobs:
  detect-changes:
    name: Detect Changed Playbooks
    runs-on: [self-hosted, homelab, ansible]
    outputs:
      playbooks: ${{ steps.find-playbooks.outputs.playbooks }}
      has-changes: ${{ steps.find-playbooks.outputs.has-changes }}
      playbook-count: ${{ steps.find-playbooks.outputs.count }}
      targets: ${{ steps.find-playbooks.outputs.targets }}
      concurrency-group: ${{ steps.find-playbooks.outputs.concurrency-group }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Need previous commit for diff

      - name: Find changed playbooks
        id: find-playbooks
        env:
          DISPATCH_PLAYBOOKS: ${{ github.event.inputs.playbooks }}
        run: |
          set -euo pipefail
          if [[ -n "${DISPATCH_PLAYBOOKS:-}" ]]; then
            echo "Manual dispatch — using provided playbooks list..."
            CHANGED_FILES=$(echo "$DISPATCH_PLAYBOOKS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
          else
            echo "Detecting changed files in last commit..."
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi
          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""

          PLAYBOOK_JSON=$(echo "$CHANGED_FILES" \
            | bash .github/workflows/lib/detect-impacted-playbooks.sh)

          COUNT=$(echo "$PLAYBOOK_JSON" | jq 'length')

          CONCURRENCY_GROUP=$(echo "$PLAYBOOK_JSON" \
            | bash .github/workflows/lib/resolve-concurrency-group.sh)

          # Health-check target derivation (preserves the existing targets output)
          TARGETS="[]"
          if echo "$PLAYBOOK_JSON" | jq -e '.[] | select(test("ocean|03_ocean"))' >/dev/null; then
            TARGETS=$(echo "$TARGETS" | jq -c '. + ["ocean"]')
          fi
          if echo "$PLAYBOOK_JSON" | jq -e '.[] | select(test("dns|bind9|dhcp|02_core"))' >/dev/null; then
            TARGETS=$(echo "$TARGETS" | jq -c '. + ["dns"]')
          fi
          if echo "$PLAYBOOK_JSON" | jq -e '.[] | select(test("github.*runner"))' >/dev/null; then
            TARGETS=$(echo "$TARGETS" | jq -c '. + ["runners"]')
          fi

          echo "Playbooks to apply: $PLAYBOOK_JSON"
          echo "Concurrency group: $CONCURRENCY_GROUP"
          echo "Health check targets: $TARGETS"

          echo "playbooks=$PLAYBOOK_JSON" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "concurrency-group=$CONCURRENCY_GROUP" >> "$GITHUB_OUTPUT"
          echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"
          if [[ "$COUNT" -gt 0 ]]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

  apply-playbooks:
    name: Apply Playbooks to Production
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: [self-hosted, homelab, ansible]
    concurrency:
      group: ${{ needs.detect-changes.outputs.concurrency-group }}
      cancel-in-progress: false
    environment: Github Actions CI
    outputs:
      total: ${{ steps.apply.outputs.total }}
      passed: ${{ steps.apply.outputs.passed }}
      failed: ${{ steps.apply.outputs.failed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python3 -m pip install --user --break-system-packages --quiet ansible
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Ansible installation
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ansible --version

      - name: Setup vault password
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          echo "$ANSIBLE_VAULT_PASSWORD" > /tmp/.vault_pass
          chmod 600 /tmp/.vault_pass

      - name: Apply playbooks to production
        id: apply
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          EXTRA_VARS: ${{ inputs.extra_vars || '' }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"

          PLAYBOOKS='${{ needs.detect-changes.outputs.playbooks }}'
          INVENTORY="inventories/production/hosts.ini"

          # Optional --extra-vars from workflow_dispatch input (empty on push).
          EXTRA_VARS_FLAG=()
          if [ -n "$EXTRA_VARS" ]; then
            EXTRA_VARS_FLAG=(--extra-vars "$EXTRA_VARS")
          fi

          echo "================================================"
          echo "Applying playbooks to production infrastructure"
          echo "================================================"
          echo ""
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.event.head_commit.author.name }}"
          echo "Message: ${{ github.event.head_commit.message }}"
          echo ""

          # Initialize counters
          TOTAL=0
          PASSED=0
          FAILED=0
          RESULTS=""
          FAILED_PLAYBOOKS=""

          # Apply each playbook
          for PLAYBOOK in $(echo "$PLAYBOOKS" | jq -r '.[]'); do
            TOTAL=$((TOTAL + 1))
            echo "========================================"
            echo "Applying: $PLAYBOOK"
            echo "========================================"
            
            START_TIME=$(date +%s)
            
            ansible-playbook \
              -i "$INVENTORY" \
              --vault-password-file=/tmp/.vault_pass \
              "${EXTRA_VARS_FLAG[@]}" \
              "$PLAYBOOK" 2>&1 | tee /tmp/playbook-${TOTAL}.log
            ANSIBLE_EXIT=${PIPESTATUS[0]}
            if [ "$ANSIBLE_EXIT" -eq 0 ]; then
              END_TIME=$(date +%s)
              DURATION=$((END_TIME - START_TIME))
              PASSED=$((PASSED + 1))
              
              # Extract hosts from playbook output
              HOSTS=$(grep -E "PLAY \[.*\]" /tmp/playbook-${TOTAL}.log | head -1 | sed 's/PLAY \[//' | sed 's/\].*//' || echo "N/A")
              
              RESULTS="${RESULTS}| \`$PLAYBOOK\` | ✅ Success | ${DURATION}s | $HOSTS |\n"
              echo ""
              echo "✅ SUCCESS: $PLAYBOOK (${DURATION}s)"
            else
              END_TIME=$(date +%s)
              DURATION=$((END_TIME - START_TIME))
              FAILED=$((FAILED + 1))
              FAILED_PLAYBOOKS="${FAILED_PLAYBOOKS}${PLAYBOOK}\n"
              
              RESULTS="${RESULTS}| \`$PLAYBOOK\` | ❌ Failed | ${DURATION}s | N/A |\n"
              echo ""
              echo "❌ FAILED: $PLAYBOOK (${DURATION}s)"
              echo "Continuing with remaining playbooks..."
            fi
            echo ""
          done

          # Save results for summary
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo -e "$RESULTS" > /tmp/apply-results.txt

          if [ -n "$FAILED_PLAYBOOKS" ]; then
            echo -e "$FAILED_PLAYBOOKS" > /tmp/failed-playbooks.txt
          fi

          echo "========================================"
          echo "Deployment Summary"
          echo "========================================"
          echo "Total: $TOTAL"
          echo "Passed: $PASSED"
          echo "Failed: $FAILED"
          echo ""

          # Fail job if any playbook failed
          if [ $FAILED -gt 0 ]; then
            echo "❌ Some playbooks failed to apply"
            exit 1
          else
            echo "✅ All playbooks applied successfully"
          fi

      - name: Cleanup vault password
        if: always()
        run: |
          rm -f /tmp/.vault_pass

      - name: Generate deployment summary
        if: always()
        run: |
          TOTAL="${{ steps.apply.outputs.total }}"
          PASSED="${{ steps.apply.outputs.passed }}"
          FAILED="${{ steps.apply.outputs.failed }}"

          if [ "$FAILED" -gt 0 ]; then
            STATUS="❌ DEPLOYMENT FAILED"
          else
            STATUS="✅ DEPLOYMENT SUCCESSFUL"
          fi

          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🚀 Production Deployment

          ## $STATUS

          **Commit:** \`${{ github.sha }}\`  
          **Author:** ${{ github.event.head_commit.author.name }}  
          **Message:** ${{ github.event.head_commit.message }}  
          **Playbooks Applied:** $TOTAL  
          **Successful:** $PASSED  
          **Failed:** $FAILED

          ## Results

          | Playbook | Status | Duration | Hosts |
          |----------|--------|----------|-------|
          $(cat /tmp/apply-results.txt)

          EOF

          if [ "$FAILED" -gt 0 ]; then
            cat >> $GITHUB_STEP_SUMMARY <<EOF

          ## ⚠️ Failed Playbooks

          The following playbooks failed to apply:

          $(cat /tmp/failed-playbooks.txt | sed 's/^/- /')

          Please review the workflow logs for details.
          EOF
          fi

          cat >> $GITHUB_STEP_SUMMARY <<EOF

          ---

          View full logs in the workflow run above.
          EOF

      - name: Upload playbook logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playbook-logs-${{ github.run_number }}
          path: /tmp/playbook-*.log
          retention-days: 30

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -f /tmp/apply-results.txt
          rm -f /tmp/failed-playbooks.txt
          rm -f /tmp/playbook-*.log

  # Post-deployment health verification
  verify-deployment:
    name: Verify Deployment Health
    needs: [detect-changes, apply-playbooks]
    if: always() && needs.apply-playbooks.result == 'success'
    runs-on: [self-hosted, homelab, ansible]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh-key: ${{ secrets.PROXMOX_SSH_KEY }}

      - name: Wait for services to stabilize
        run: |
          echo "⏳ Waiting 30 seconds for services to stabilize..."
          sleep 30

      - name: Verify Ocean services
        if: contains(needs.detect-changes.outputs.targets, 'ocean')
        id: ocean
        continue-on-error: true
        run: |
          echo "🔍 Verifying Ocean services..."

          SERVICES=(
            "nginx:80"
            "plex:32400"
            "prometheus:9090"
            "grafana:3000"
          )

          HEALTHY=0
          FAILED=0

          for svc in "${SERVICES[@]}"; do
            NAME="${svc%%:*}"
            PORT="${svc##*:}"
            
            # Try up to 3 times with 5s delay
            for attempt in 1 2 3; do
              if timeout 5 bash -c "echo >/dev/tcp/192.168.1.143/$PORT" 2>/dev/null; then
                echo "✅ $NAME (port $PORT) responding"
                HEALTHY=$((HEALTHY + 1))
                break
              fi
              [ $attempt -lt 3 ] && sleep 5
            done

            if [ $attempt -eq 3 ]; then
              echo "❌ $NAME (port $PORT) NOT responding after 3 attempts"
              FAILED=$((FAILED + 1))
            fi
          done

          echo "Ocean: $HEALTHY healthy, $FAILED failed"
          [ $FAILED -gt 0 ] && exit 1 || exit 0

      - name: Verify DNS services
        if: contains(needs.detect-changes.outputs.targets, 'dns')
        id: dns
        continue-on-error: true
        run: |
          echo "🔍 Verifying DNS services..."

          # Test internal DNS
          if dig @192.168.1.2 ocean.home +short +time=5 | grep -q "192.168"; then
            echo "✅ Internal DNS resolution working"
          else
            echo "❌ Internal DNS resolution FAILED"
            exit 1
          fi

          # Test external forwarding
          if dig @192.168.1.2 google.com +short +time=5 | grep -qE "^[0-9]"; then
            echo "✅ External DNS forwarding working"
          else
            echo "❌ External DNS forwarding FAILED"
            exit 1
          fi

          echo "DNS: All checks passed"

      - name: Generate verification summary
        if: always()
        run: |
          OCEAN_STATUS="${{ steps.ocean.outcome || 'skipped' }}"
          DNS_STATUS="${{ steps.dns.outcome || 'skipped' }}"

          # Determine overall status
          if [ "$OCEAN_STATUS" = "failure" ] || [ "$DNS_STATUS" = "failure" ]; then
            OVERALL="⚠️ DEGRADED"
          elif [ "$OCEAN_STATUS" = "success" ] || [ "$DNS_STATUS" = "success" ]; then
            OVERALL="✅ HEALTHY"
          else
            OVERALL="ℹ️ NOT VERIFIED"
          fi

          cat >> $GITHUB_STEP_SUMMARY <<EOF

          ---

          ## 🏥 Post-Deployment Health Check

          **Overall Status:** $OVERALL

          | Target | Status |
          |--------|--------|
          | Ocean Services | $OCEAN_STATUS |
          | DNS Services | $DNS_STATUS |

          Health verification completed at $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF

          echo "Post-deployment verification: $OVERALL"
