# Forward all .home domain queries to local DNS servers
# Pihole should NEVER answer for .home domains - always forward to authoritative servers
# Primary: dns01 (192.168.1.2) - ISC BIND9
# Secondary: dns02 (192.168.1.3) - PowerDNS

# Forward .home domain to both DNS servers (redundancy)
server=/home/192.168.1.2
server=/home/192.168.1.3

# Forward cluster.local domain to both DNS servers (Kubernetes services)
server=/cluster.local/192.168.1.2
server=/cluster.local/192.168.1.3

# Do not read /etc/hosts for .home domain
no-hosts
