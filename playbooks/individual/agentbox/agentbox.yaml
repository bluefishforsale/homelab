---
# agentbox host configuration.
# Installs the multi-model agent toolchain (Claude Code premium lane + opencode
# free lanes), renders config/scripts/units, and enables the issue-watcher and
# escalation timers.
#
# ONE-TIME MANUAL BOOTSTRAP (cannot be automated; interactive OAuth):
#   ssh debian@agentbox
#   claude /login          # Pro/Max subscription. Do NOT export ANTHROPIC_API_KEY.
#   gh auth login          # only if no vaulted PAT (agentbox.github_pat)
#   gcloud auth login      # only if not using a vaulted service-account key
#   for r in homelab photonic_inventory my-ta-jose; do \
#     gh repo clone bluefishforsale/$r repos/$r; done   # rc-repo clones
#   sudo systemctl start agentbox-rc@homelab.service     # ...per rc repo, after /login
#
# Structure mirrors playbooks/individual/ocean/ai/paia.yaml.

- name: Configure agentbox multi-model agent host
  hosts: agent_hosts
  become: true
  gather_facts: true

  vars_files:
    - "{{ playbook_dir }}/../../../vault/secrets.yaml"

  vars:
    service: agentbox
    user: debian
    home: "/home/debian"
    files: "{{ playbook_dir }}/../../../files/agentbox"
    # Deployable repos (Shape A/B) whose open issues the fleet resolves.
    agentbox_repos:
      - paia
      - blog_terrac_com
      - globalview
      - globalview-backend-py
      - my-ta-jose
      - photonic_inventory
      - terrac_com_2026
    # Repos driven live via a per-repo Claude Code remote-control session
    # (systemd template agentbox-rc@<repo>.service, cwd repos/<repo>).
    agentbox_rc_repos:
      - homelab
      - photonic_inventory
      - my-ta-jose
    # Opt-in auto-merge allowlist (ADR 0001). Empty = every PR waits for a human
    # merge; listed repos auto-merge only no-prod-effect diffs.
    agentbox_automerge_repos: []
    # OpenTelemetry collector. Verify the latest contrib release at deploy time.
    otelcol_version: "0.105.0"
    # Third-party opencode OTel plugin. Pin; verify the published version at deploy.
    opencode_otel_plugin_version: "0.1.0"
    # Loki native OTLP ingest endpoint (ocean). Collector forwards logs here.
    LOKI_OTLP_URL: "http://192.168.1.143:3100/otlp"
    # Shared MCP servers distributed to BOTH lanes (opencode + Claude Code).
    # Neutral shape; rendered into each tool's config. Add a server here, deploy.
    #   - name: context7
    #     command: npx
    #     args: ["-y", "@upstash/context7-mcp"]
    #     env: {}
    #   - name: somehttp
    #     url: https://example.com/mcp
    agentbox_mcp_servers: []

  tasks:

  - name: Install base packages
    ansible.builtin.apt:
      name:
        - curl
        - ca-certificates
        - gnupg
        - git
        - jq
        - tmux
        - nodejs
        - npm
      state: present
      update_cache: yes

  # --- Claude Code (apt repo) ---
  - name: Ensure apt keyrings dir exists
    ansible.builtin.file:
      path: /etc/apt/keyrings
      state: directory
      mode: '0755'

  - name: Add Claude Code apt key
    ansible.builtin.get_url:
      url: https://downloads.claude.ai/keys/claude-code.asc
      dest: /etc/apt/keyrings/claude-code.asc
      mode: '0644'

  - name: Add Claude Code apt repository
    ansible.builtin.apt_repository:
      repo: "deb [signed-by=/etc/apt/keyrings/claude-code.asc] https://downloads.claude.ai/claude-code/apt/stable stable main"
      filename: claude-code
      state: present

  - name: Add GitHub CLI apt key
    ansible.builtin.get_url:
      url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
      dest: /usr/share/keyrings/githubcli-archive-keyring.gpg
      mode: '0644'

  - name: Add GitHub CLI apt repository
    ansible.builtin.apt_repository:
      repo: "deb [signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
      filename: github-cli
      state: present

  # gcloud is out-of-scope for v1 (headless Google is optional; the issue->PR
  # loop needs only gh + claude + opencode). Its apt repo also breaks on Google's
  # rotated signing key. Re-add later by dearmoring the key:
  #   curl -fsSL .../apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
  - name: Install Claude Code and GitHub CLI
    ansible.builtin.apt:
      name:
        - claude-code
        - gh
      state: present
      update_cache: yes

  - name: Install opencode (npm global)
    ansible.builtin.command: npm install -g opencode-ai
    args:
      creates: /usr/local/bin/opencode

  # --- Telemetry: OpenTelemetry Collector (contrib) ---
  - name: Download otelcol-contrib deb
    ansible.builtin.get_url:
      url: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otelcol_version }}/otelcol-contrib_{{ otelcol_version }}_linux_amd64.deb"
      dest: "/tmp/otelcol-contrib_{{ otelcol_version }}.deb"
      mode: '0644'

  - name: Install otelcol-contrib
    ansible.builtin.apt:
      deb: "/tmp/otelcol-contrib_{{ otelcol_version }}.deb"

  # --- Host metrics: native node_exporter (agentbox runs no docker) ---
  - name: Install Prometheus node exporter
    ansible.builtin.apt:
      name: prometheus-node-exporter
      state: present

  - name: Enable systemd + processes collectors (lane liveness via node_systemd_unit_state)
    ansible.builtin.copy:
      dest: /etc/default/prometheus-node-exporter
      content: |
        # Managed by ansible (agentbox.yaml)
        ARGS="--collector.systemd --collector.processes"
      mode: '0644'
    notify: Restart node exporter

  - name: Enable and start node exporter
    ansible.builtin.systemd:
      name: prometheus-node-exporter
      enabled: yes
      state: started

  # --- Directories ---
  - name: Ensure agentbox directories exist
    ansible.builtin.file:
      path: "{{ item }}"
      state: directory
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0755'
    loop: "{{ [home + '/repos', home + '/.config/opencode', home + '/.config/opencode/skills', home + '/.config/opencode/commands', home + '/.config/agentbox', home + '/.claude', home + '/.claude/skills', home + '/.claude/commands'] + (agentbox_rc_repos | map('regex_replace', '^', home + '/repos/') | list) }}"

  # --- Config + secrets ---
  - name: Render opencode config
    ansible.builtin.template:
      src: "{{ files }}/opencode.json.j2"
      dest: "{{ home }}/.config/opencode/opencode.json"
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0644'

  - name: Render agentbox environment file
    ansible.builtin.template:
      src: "{{ files }}/agentbox.env.j2"
      dest: "{{ home }}/.config/agentbox/agentbox.env"
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0600'

  - name: Write Google service-account credentials (when present in vault)
    ansible.builtin.copy:
      content: "{{ (agentbox | default({})).gcloud_sa_json | default('') }}"
      dest: "{{ home }}/.config/agentbox/gcloud-sa.json"
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0600'
    when: (agentbox | default({})).gcloud_sa_json | default('') | length > 0

  - name: Render OpenTelemetry Collector config
    ansible.builtin.template:
      src: "{{ files }}/otelcol-config.yaml.j2"
      dest: /etc/otelcol-contrib/config.yaml
      mode: '0644'
    notify: Restart otelcol

  - name: Enable and start otelcol-contrib
    ansible.builtin.systemd:
      name: otelcol-contrib
      enabled: yes
      state: started

  # --- Scripts ---
  - name: Install agent scripts
    ansible.builtin.template:
      src: "{{ files }}/{{ item.src }}"
      dest: "/usr/local/bin/{{ item.dest }}"
      mode: '0755'
    loop:
      - { src: issue-watcher.sh, dest: agentbox-issue-watcher.sh }
      - { src: escalate-to-claude.sh, dest: agentbox-escalate-to-claude.sh }

  # --- systemd units ---
  - name: Install systemd units
    ansible.builtin.template:
      src: "{{ files }}/{{ item }}.j2"
      dest: "/etc/systemd/system/{{ item }}"
      mode: '0644'
    loop:
      - agentbox-issue-watcher.service
      - agentbox-issue-watcher.timer
      - agentbox-escalate.service
      - agentbox-escalate.timer
      - "agentbox-rc@.service"
    notify: Reload systemd daemon

  - name: Flush handlers so units are registered before enabling
    ansible.builtin.meta: flush_handlers

  - name: Enable agent timers
    ansible.builtin.systemd:
      name: "{{ item }}"
      enabled: yes
      state: started
      daemon_reload: yes
    loop:
      - agentbox-issue-watcher.timer
      - agentbox-escalate.timer

  # Per-repo remote-control instances are enabled (start on boot) but not
  # started now: they need the one-time interactive `claude /login` and a clone
  # of each repo into repos/<repo> first (see header). After bootstrap they
  # come up on the next boot or via `systemctl start`.
  - name: Enable per-repo remote-control instances
    ansible.builtin.systemd:
      name: "agentbox-rc@{{ item }}.service"
      enabled: yes
      daemon_reload: yes
    loop: "{{ agentbox_rc_repos }}"

  - name: Note remote-control requires manual login + repo clones
    ansible.builtin.debug:
      msg: "On agentbox: 'claude /login', clone each agentbox_rc_repos into repos/<repo>, then 'systemctl start agentbox-rc@<repo>.service'."

  # --- Shared agent config (skills, commands, scripts, MCP) ---
  # One source tree (files/agentbox/shared) fanned out to both lanes. Autonomous
  # lanes (opencode run, claude -p) spawn fresh per issue and pick changes up on
  # the next tick; long-lived RC sessions are restarted by the handler.
  - name: Sync shared skills to both lanes
    ansible.builtin.copy:
      src: "{{ files }}/shared/skills/"
      dest: "{{ item }}/skills/"
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0644'
    loop:
      - "{{ home }}/.claude"
      - "{{ home }}/.config/opencode"
    notify: Restart RC sessions

  - name: Sync shared commands to both lanes
    ansible.builtin.copy:
      src: "{{ files }}/shared/commands/"
      dest: "{{ item }}/commands/"
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0644'
    loop:
      - "{{ home }}/.claude"
      - "{{ home }}/.config/opencode"
    notify: Restart RC sessions

  - name: Install shared agent scripts on PATH
    ansible.builtin.copy:
      src: "{{ item }}"
      dest: "/usr/local/bin/{{ item | basename }}"
      mode: '0755'
    with_fileglob: "{{ files }}/shared/bin/*"
    notify: Restart RC sessions

  - name: Sync shared instructions (opencode AGENTS.md + Claude import target)
    ansible.builtin.copy:
      src: "{{ files }}/shared/AGENTS.md"
      dest: "{{ item }}"
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0644'
    loop:
      - "{{ home }}/.config/opencode/AGENTS.md"
      - "{{ home }}/.claude/AGENTS.md"
    notify: Restart RC sessions

  - name: Point Claude user memory at the shared instructions
    ansible.builtin.copy:
      content: "@AGENTS.md\n"
      dest: "{{ home }}/.claude/CLAUDE.md"
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0644'
    notify: Restart RC sessions

  # MCP into Claude is added (not templated): ~/.claude.json also holds Claude's
  # own runtime state, so we merge via the CLI instead of overwriting the file.
  - name: List Claude MCP servers (user scope)
    ansible.builtin.command: claude mcp list
    become_user: "{{ user }}"
    environment:
      HOME: "{{ home }}"
    register: claude_mcp_list
    changed_when: false
    failed_when: false

  - name: Register shared MCP servers in Claude Code (user scope)
    ansible.builtin.command: >
      claude mcp add-json {{ item.name | quote }}
      {{ ({'type': 'http', 'url': item.url} if item.url is defined
          else {'type': 'stdio', 'command': item.command, 'args': item.args | default([]), 'env': item.env | default({})}) | to_json | quote }}
      --scope user
    become_user: "{{ user }}"
    environment:
      HOME: "{{ home }}"
    loop: "{{ agentbox_mcp_servers }}"
    when: item.name not in (claude_mcp_list.stdout | default(''))
    notify: Restart RC sessions

  handlers:
  - name: Reload systemd daemon
    ansible.builtin.systemd:
      daemon_reload: yes

  - name: Restart node exporter
    ansible.builtin.systemd:
      name: prometheus-node-exporter
      state: restarted

  - name: Restart otelcol
    ansible.builtin.systemd:
      name: otelcol-contrib
      state: restarted

  # try-restart only touches active instances (no-op before first login), so a
  # shared-config change reloads any live RC session without starting new ones.
  - name: Restart RC sessions
    ansible.builtin.command: systemctl try-restart 'agentbox-rc@*.service'
    changed_when: true
