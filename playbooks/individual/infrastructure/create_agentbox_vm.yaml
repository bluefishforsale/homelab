---
# Proxmox VM creation for the agentbox host
# Creates a single CPU-only orchestration VM on node005 that runs the
# multi-model agent fleet (Claude Code premium lane + opencode free lanes).
# Inference is remote (ocean GPU at llama.home) or cloud-free (Gemini), so this
# box needs no GPU. Pattern mirrors create_runner_vm.yaml.

- name: Create agentbox VM on Proxmox
  hosts: node005
  become: true
  gather_facts: true
  vars:
    agentbox_vm_id: 3000
    agentbox_vm_name: agentbox
    agentbox_vm_hostname: agentbox
    agentbox_vm_cores: 6
    agentbox_vm_memory_mb: 12288  # 12 GB
    agentbox_vm_disk_size_increase: "+48G"  # repos + node toolchain + worktrees
    agentbox_vm_template_id: 9999  # Debian 12 cloud-init template
    agentbox_vm_onboot: 1  # Start on Proxmox host boot

    # Network: resolve via DNS if present, else the static .31 allocation.
    agentbox_vm_ip: "{{ lookup('dig', agentbox_vm_hostname + '.home', errors='ignore') | default('192.168.1.31', true) }}"
    agentbox_vm_netmask: 24
    agentbox_vm_gateway: 192.168.1.1
    agentbox_vm_nameserver: 192.168.1.2

  tasks:
    - name: Download SSH keys for agentbox VM
      ansible.builtin.get_url:
        url: "https://github.com/bluefishforsale.keys"
        dest: "/root/ssh.keys"
        mode: '0600'
        owner: root
        group: root

    - name: Check agentbox VM status
      ansible.builtin.command: "qm status {{ agentbox_vm_id }}"
      register: agentbox_vm_status
      ignore_errors: true
      changed_when: false

    - name: Clone template for agentbox VM
      ansible.builtin.command: "qm clone {{ agentbox_vm_template_id }} {{ agentbox_vm_id }}"
      when: agentbox_vm_status.rc != 0
      register: clone_result

    - name: Set agentbox VM name and network configuration
      ansible.builtin.shell: |
        qm set {{ agentbox_vm_id }} --name {{ agentbox_vm_name }}
        qm set {{ agentbox_vm_id }} --ipconfig0 ip={{ agentbox_vm_ip }}/{{ agentbox_vm_netmask }},gw={{ agentbox_vm_gateway }}
        qm set {{ agentbox_vm_id }} --nameserver {{ agentbox_vm_nameserver }}
        qm set {{ agentbox_vm_id }} --onboot {{ agentbox_vm_onboot }}
      when: agentbox_vm_status.rc != 0 or agentbox_vm_status.stdout is not search('running')
      changed_when: true

    - name: Set SSH keys for agentbox VM
      ansible.builtin.shell: "qm set {{ agentbox_vm_id }} --sshkeys /root/ssh.keys"
      when: agentbox_vm_status.rc != 0 or agentbox_vm_status.stdout is not search('running')
      changed_when: true

    - name: Resize agentbox VM disk
      ansible.builtin.shell: "qm resize {{ agentbox_vm_id }} scsi0 {{ agentbox_vm_disk_size_increase }}"
      when: agentbox_vm_status.rc != 0
      changed_when: true

    - name: Set agentbox VM CPU cores
      ansible.builtin.shell: "qm set {{ agentbox_vm_id }} --cores {{ agentbox_vm_cores }}"
      when: agentbox_vm_status.rc != 0 or agentbox_vm_status.stdout is not search('running')
      changed_when: true

    - name: Set agentbox VM memory
      ansible.builtin.shell: "qm set {{ agentbox_vm_id }} --memory {{ agentbox_vm_memory_mb }}"
      when: agentbox_vm_status.rc != 0 or agentbox_vm_status.stdout is not search('running')
      changed_when: true

    - name: Set agentbox VM description
      ansible.builtin.shell: |
        qm set {{ agentbox_vm_id }} --description "Agent box - multi-model agent fleet (Claude Code + opencode)"
      when: agentbox_vm_status.rc != 0
      changed_when: true

    - name: Start agentbox VM
      ansible.builtin.command: "qm start {{ agentbox_vm_id }}"
      when: agentbox_vm_status.rc != 0 or agentbox_vm_status.stdout is not search('running')
      changed_when: true

    - name: Display boot wait message
      ansible.builtin.debug:
        msg:
          - "Starting agentbox VM and waiting for boot..."
          - "This typically takes 1-3 minutes for cloud-init and SSH to initialize"
          - "Maximum wait time: 5 minutes"
          - "VM IP: {{ agentbox_vm_ip }}"
      when: agentbox_vm_status.rc != 0 or (clone_result is defined and clone_result is changed)

    - name: Wait for agentbox VM to boot and accept SSH connections (max 5 minutes)
      ansible.builtin.wait_for:
        host: "{{ agentbox_vm_ip }}"
        port: 22
        delay: 10
        timeout: 300
        state: started
        msg: "Waiting for {{ agentbox_vm_ip }}:22 to become available..."
      when: agentbox_vm_status.rc != 0 or (clone_result is defined and clone_result is changed)

    - name: Display agentbox VM information
      ansible.builtin.debug:
        msg:
          - "agentbox VM created successfully"
          - "VM ID: {{ agentbox_vm_id }}"
          - "VM Name: {{ agentbox_vm_name }}"
          - "IP Address: {{ agentbox_vm_ip }}"
          - "vCPUs: {{ agentbox_vm_cores }}"
          - "Memory: {{ agentbox_vm_memory_mb }} MB ({{ (agentbox_vm_memory_mb / 1024) | int }} GB)"
          - ""
          - "Next steps:"
          - "1. agentbox is already in inventory under [vms] and [agentbox]"
          - "2. Deploy the host config: ansible-playbook playbooks/individual/agentbox/agentbox.yaml"
          - "3. One-time manual auth on the box (see playbook header): claude /login, gh auth login, gcloud auth"
