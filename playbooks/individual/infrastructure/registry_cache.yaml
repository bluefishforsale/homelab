---
# Docker Registry Pull-Through Cache
# Four registry:2 containers (docker-hub, ghcr, gitlab, nvcr) + promtail sidecar.
#
# Prerequisites:
#   - VM created via playbooks/individual/infrastructure/create_registry_cache_vm.yaml
#   - vault/secrets.yaml provides development.docker_registry.username/password
#     (Docker Hub credentials, used by the docker-hub-cache upstream auth)
#
# Docker is bootstrapped inline; no separate docker_ce run required for this host.
#
# Usage:
#   ansible-playbook -i inventories/production/hosts.ini \
#     playbooks/individual/infrastructure/registry_cache.yaml

- name: Deploy registry pull-through cache stack
  hosts: registry_cache
  become: true
  gather_facts: true

  vars_files:
    - "{{ playbook_dir }}/../../../vault/secrets.yaml"

  vars:
    service: registry-cache
    files: "{{ playbook_dir }}/../../../files/registry-cache"
    data: /data01
    home: "{{ data }}/services/{{ service }}"

  tasks:
    - name: Wait for cloud-init to finish on first boot
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      failed_when: false

    - name: Install Docker apt prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes
        lock_timeout: 600

    - name: Ensure /etc/apt/keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Install Docker apt key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian bookworm stable"
        state: present
        filename: docker

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes
        lock_timeout: 600

    - name: Ensure /etc/docker exists
      ansible.builtin.file:
        path: /etc/docker
        state: directory
        mode: '0755'

    - name: Render Docker daemon.json (no registry-mirror on the cache host itself)
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../../files/docker/daemon.json.j2"
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: '0644'
      notify: Restart docker

    - name: Ensure Docker service is started and enabled
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Ensure base directory exists
      ansible.builtin.file:
        path: "{{ home }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure config directory exists
      ansible.builtin.file:
        path: "{{ home }}/config"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure per-upstream data directories exist
      ansible.builtin.file:
        path: "{{ home }}/data/{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - docker-hub
        - ghcr
        - gitlab
        - nvcr

    - name: Render registry configs for each upstream
      ansible.builtin.template:
        src: "{{ files }}/config/{{ item }}.yml.j2"
        dest: "{{ home }}/config/{{ item }}.yml"
        owner: root
        group: root
        mode: '0644'
      loop:
        - docker-hub
        - ghcr
        - gitlab
        - nvcr
      notify:
        - Restart registry-cache service

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: "{{ files }}/docker-compose.yml.j2"
        dest: "{{ home }}/docker-compose.yml"
        owner: root
        group: root
        mode: '0644'
      notify:
        - Restart registry-cache service

    - name: Render promtail config
      ansible.builtin.template:
        src: "{{ files }}/promtail-config.yml.j2"
        dest: "{{ home }}/config/promtail-config.yml"
        owner: root
        group: root
        mode: '0644'
      notify:
        - Restart registry-cache service

    - name: Install registry-cache systemd unit
      ansible.builtin.template:
        src: "{{ files }}/registry-cache.service.j2"
        dest: /etc/systemd/system/registry-cache.service
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd daemon
        - Restart registry-cache service

    - name: Enable registry-cache service
      ansible.builtin.systemd:
        name: registry-cache.service
        enabled: yes
        state: started
        daemon_reload: yes

  handlers:
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Restart registry-cache service
      ansible.builtin.systemd:
        name: registry-cache.service
        state: restarted

    - name: Restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
        daemon_reload: yes
