---
- name: Configure Open WebUI for llama.cpp with Docker Compose
  hosts: ocean
  become: true
  gather_facts: true

  vars_files:
    - "{{ playbook_dir }}/../../../../vault/secrets.yaml"
    - "{{ playbook_dir }}/../../../../vars/vars_service_ports.yaml"

  vars:
    service: open-webui
    image: ghcr.io/open-webui/open-webui
    version: main
    port: "{{ service_ports.open_webui.port }}"
    data: /data01
    files: "{{ playbook_dir }}/../../../../files/ocean-open-webui"
    home: "{{ data }}/services/{{ service }}"
    user: media
    uid: 1001
    gid: 1001
    # Using SQLite for database storage (stored in /data01/services/open-webui/data)

  tasks:

  - name: Ensure base directory exists
    ansible.builtin.file:
      path: "{{ home }}"
      state: directory
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0755'

  - name: Ensure subdirectories exist with proper permissions
    ansible.builtin.file:
      path: "{{ home }}/{{ item }}"
      state: directory
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0755'
    with_items:
    - data
    - config
    - logs

  - name: Ensure database directory has write permissions for container
    ansible.builtin.file:
      path: "{{ home }}/data"
      state: directory
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0755'

  - name: Ensure data directory has proper permissions for container
    ansible.builtin.shell: |
      chmod -R 777 {{ home }}/data
      chmod -R 777 {{ home }}/config  
      chmod -R 777 {{ home }}/logs
      touch {{ home }}/data/webui.db
      chmod 666 {{ home }}/data/webui.db
    changed_when: false

  - name: Verify database file creation
    ansible.builtin.stat:
      path: "{{ home }}/data/webui.db"
    register: db_file_stat

  - name: Debug database file status
    ansible.builtin.debug:
      msg: "Database file exists: {{ db_file_stat.stat.exists }}, permissions: {{ db_file_stat.stat.mode if db_file_stat.stat.exists else 'N/A' }}"


  - name: Create docker-compose.yml
    ansible.builtin.template:
      src: "{{ files }}/docker-compose.yml.j2"
      dest: "{{ home }}/docker-compose.yml"
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0644'
    notify:
    - Reload systemd daemon
    - Restart open-webui service

  - name: Create open-webui systemd service
    ansible.builtin.template:
      src: "{{ files }}/{{ item }}.j2"
      dest: "/etc/systemd/system/{{ item }}"
      mode: '0644'
    with_items:
    - open-webui.service
    notify:
    - Reload systemd daemon
    - Restart open-webui service

  - name: Enable open-webui service
    ansible.builtin.systemd:
      name: open-webui.service
      enabled: yes
      daemon_reload: yes

  - name: Wait for open-webui service to start
    ansible.builtin.wait_for:
      port: "{{ port }}"
      host: "{{ ansible_default_ipv4.address }}"
      timeout: 60
    ignore_errors: yes

  # Open WebUI's PersistentConfig freezes OPENAI_API_KEYS into webui.db on
  # first boot; after that the env var is ignored and the stored value wins.
  # Reconcile the stored key to the vault so key changes actually take effect.
  - name: Reconcile stored llama.cpp API key in open-webui DB
    ansible.builtin.command:
      argv:
        - docker
        - exec
        - "-e"
        - "NEW_KEY={{ ai_services.llamacpp.api_keys.openwebui }}"
        - "{{ service }}"
        - python3
        - "-c"
        - |
          import sqlite3, json, os
          desired = json.dumps([os.environ["NEW_KEY"]])
          conn = sqlite3.connect("/data/webui.db")
          row = conn.execute("select value from config where key='openai.api_keys'").fetchone()
          if row is None:
              print("NOROW"); raise SystemExit(0)
          if row[0] == desired:
              print("OK"); raise SystemExit(0)
          conn.execute("update config set value=? where key='openai.api_keys'", (desired,))
          conn.commit()
          print("CHANGED")
    register: owui_key_reconcile
    changed_when: "'CHANGED' in owui_key_reconcile.stdout"
    no_log: true
    notify:
    - Restart open-webui service

  handlers:
  - name: Reload systemd daemon
    ansible.builtin.systemd:
      daemon_reload: yes

  - name: Restart open-webui service
    ansible.builtin.systemd:
      name: open-webui.service
      state: restarted
