---
# paia: Discord bot + metrics server for ocean
- name: Deploy paia personal AI assistant using Docker Compose
  hosts: ocean
  become: true
  gather_facts: true

  vars_files:
    - "{{ playbook_dir }}/../../../../vault/secrets.yaml"

  vars:
    service: paia
    image: ghcr.io/bluefishforsale/paia
    version: latest
    metrics_port: 9092
    data: /data01
    files: "{{ playbook_dir }}/../../../../files/paia"
    home: "{{ data }}/services/{{ service }}"
    user: media
    uid: 1001
    gid: 1001

  tasks:

  - name: Log ocean into GHCR to pull private paia image
    ansible.builtin.shell: |
      echo "{{ development.github.packages_read_token }}" | docker login ghcr.io -u bluefishforsale --password-stdin
    no_log: true

  - name: Ensure base directory exists
    ansible.builtin.file:
      path: "{{ home }}"
      state: directory
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0755'

  - name: Ensure data subdirectory exists
    ansible.builtin.file:
      path: "{{ home }}/data"
      state: directory
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0750'

  - name: Create docker-compose.yml
    ansible.builtin.template:
      src: "{{ files }}/docker-compose.yml.j2"
      dest: "{{ home }}/docker-compose.yml"
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0644'
    notify:
    - Reload systemd daemon
    - Restart paia service

  - name: Create paia environment file
    ansible.builtin.template:
      src: "{{ files }}/paia.env.j2"
      dest: "{{ home }}/.env"
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: '0600'
    notify:
    - Reload systemd daemon
    - Restart paia service

  - name: Create paia systemd service
    ansible.builtin.template:
      src: "{{ files }}/{{ item }}.j2"
      dest: "/etc/systemd/system/{{ item }}"
      mode: '0644'
    with_items:
    - paia.service
    notify:
    - Reload systemd daemon
    - Restart paia service

  - name: Enable paia service
    ansible.builtin.systemd:
      name: paia.service
      enabled: yes
      daemon_reload: yes

  handlers:
  - name: Reload systemd daemon
    ansible.builtin.systemd:
      daemon_reload: yes

  - name: Restart paia service
    ansible.builtin.systemd:
      name: paia.service
      state: restarted
