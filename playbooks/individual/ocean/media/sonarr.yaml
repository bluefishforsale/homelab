---
- name: Configure systemd service for sonarr
  hosts: ocean
  become: true
  vars_files:
    - ../../../../vault/secrets.yaml
    - ../../../../vars/vars_service_ports.yaml

  vars:
    service: sonarr
    image: linuxserver/sonarr
    version: latest
    sonarr_port: "{{ service_ports.sonarr.port }}"
    exporter_service: sonarr-exporter
    exporter_image: ghcr.io/onedr0p/exportarr
    exporter_version: latest
    exporter_port: "{{ service_ports.sonarr_exporter.port }}"
    data: /data01
    files: ../../../../files/ocean-sonarr
    incoming: "{{ data }}/incoming"
    complete: "{{ data }}/complete"
    home: "{{ data }}/services/{{ service }}"
    user: media

  tasks:

    - name: Ensure basedir exists
      ansible.builtin.file:
        path: "{{ home }}"
        state: directory
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: '0755'

    - name: Create config files
      ansible.builtin.template:
        src: "{{ files }}/config.xml.j2"
        dest: "{{ home }}/config.xml"
        mode: '0644'
      notify:
        - Reload sonarr systemd daemon
        - Restart sonarr service

    - name: Create sonarr systemd service 
      ansible.builtin.template:
        src: "{{ files }}/{{ item }}.j2"
        dest: "/etc/systemd/system/{{ item }}"
        mode: '0644'
      with_items:
      - sonarr.service
      notify:
        - Reload sonarr systemd daemon
        - Restart sonarr service

    - name: Create exporter systemd service 
      ansible.builtin.template:
        src: "{{ files }}/{{ item }}.j2"
        dest: "/etc/systemd/system/{{ item }}"
        mode: '0644'
      with_items:
      - sonarr-exporter.service
      notify:
        - Reload exporter systemd daemon
        - Restart exporter service

    - name: Ensure Sonarr is responding before API call
      ansible.builtin.uri:
        url: "http://localhost:{{ sonarr_port }}/api/v3/system/status"
        method: GET
        headers:
          X-Api-Key: "{{ media_services.sonarr.api_key }}"
        status_code: 200
      register: sonarr_status
      retries: 10
      delay: 5
      until: sonarr_status.status == 200
      changed_when: false
      tags: [rss]

    - name: Get current Sonarr indexer config
      ansible.builtin.uri:
        url: "http://localhost:{{ sonarr_port }}/api/v3/config/indexer"
        method: GET
        headers:
          X-Api-Key: "{{ media_services.sonarr.api_key }}"
        return_content: true
      register: sonarr_indexer_config
      changed_when: false
      tags: [rss]

    - name: Set Sonarr RSS sync interval to 10 minutes
      ansible.builtin.uri:
        url: "http://localhost:{{ sonarr_port }}/api/v3/config/indexer"
        method: PUT
        headers:
          X-Api-Key: "{{ media_services.sonarr.api_key }}"
        body_format: json
        body: "{{ sonarr_indexer_config.json | combine({'rssSyncInterval': 10}) }}"
        status_code: [200, 202]
      when: sonarr_indexer_config.json.rssSyncInterval != 10
      tags: [rss]

  handlers:
    - name: Reload sonarr systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Restart sonarr service
      ansible.builtin.systemd:
        name: sonarr.service
        state: restarted

    - name: Reload exporter systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Restart exporter service
      ansible.builtin.systemd:
        name: sonarr-exporter.service
        state: restarted
        enabled: true
