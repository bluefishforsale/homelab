---
- name: Deploy DCGM Exporter
  hosts: ocean
  become: true
  vars:
    user: terrac
    home: /home/terrac
    service_name: dcgm-exporter

  tasks:
    - name: Create dcgm-exporter directory
      file:
        path: "{{ home }}/{{ service_name }}"
        state: directory
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: '0755'

    - name: Copy docker-compose template
      template:
        src: "{{ playbook_dir }}/../../../../files/ocean-nvidia/docker-compose.yml.j2"
        dest: "{{ home }}/{{ service_name }}/docker-compose.yml"
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: '0644'
      notify: Restart dcgm-exporter

    - name: Copy systemd service file
      template:
        src: "{{ playbook_dir }}/../../../../files/ocean-nvidia/dcgm-exporter.service.j2"
        dest: "/etc/systemd/system/{{ service_name }}.service"
        owner: root
        group: root
        mode: '0644'
      notify: Restart dcgm-exporter

    # Guarantee the exporter is up on every converge, not just when a template
    # changes. The Restart handler only fires on a template change, so a run that
    # finds both files unchanged never (re)starts the service. If dcgm-exporter
    # stopped meanwhile (reboot, a docker restart, crash) the ocean.home:9400
    # scrape target stayed down and Prometheus fired ServiceDown for the
    # nvidia-exporter job. This idempotent task is a no-op once running.
    - name: Enable and start dcgm-exporter service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        enabled: yes
        state: started
        daemon_reload: yes

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Restart dcgm-exporter
      systemd:
        name: "{{ service_name }}"
        state: restarted
        enabled: yes
        daemon_reload: yes
