---
- name: Cloudflare_ddns
  hosts: ocean
  become: true
  gather_facts: true
  
  vars_files:
    - "{{ playbook_dir }}/../../../../vault/secrets.yaml"

  vars:
    data01: /data01/services
    service: cloudflare_ddns
    path_home: "{{ data01 }}/{{ service }}"
    files: "{{ playbook_dir }}/../../../../files/cloudflare_ddns"
    systemd_services:
    - "{{ service }}.timer"
    - "{{ service }}.service"
    cf_api_key: "{{ external_apis.ddns.cloudflare_token }}"
    cf_zone_id: "{{ cloudflare.terrac_com }}"
    cf_records:
    # Removed terrac.com apex - now using CNAME to Cloudflare Tunnel instead of DDNS A record
    # - dns: terrac.com
    #   api_key: "{{ cf_api_key }}"
    #   zone_id: "{{ cf_zone_id }}"
    #   record_id: 81fa8a096a6ceb11e264f0ccde2a4c86
    - dns: home.terrac.com
      api_key: "{{ cf_api_key }}"
      zone_id: "{{ cf_zone_id }}"
      record_id: e784411c49566ab8fe5e5ab69490e6ac

  tasks:

  - name: Ensure service directory exists
    ansible.builtin.file:
      path: "{{ path_home }}"
      state: directory
      mode: '0755'

  - name: Template script
    ansible.builtin.template:
      src: "{{ files }}/{{ item }}.j2"
      dest: "{{ path_home }}/{{ item }}"
      mode: '0755'
    with_items:
    - cloudflare_ddns.sh
    notify:
    - Reload systemd daemon
    - Restart cloudflare_ddns services

  - name: Create systemd service and timer
    ansible.builtin.template:
      src: "{{ files }}/{{ item }}.j2"
      dest: "/etc/systemd/system/{{ item }}"
      mode: '0644'
    loop: "{{ systemd_services }}"
    notify:
    - Reload systemd daemon
    - Restart cloudflare_ddns services

  handlers:
  - name: Reload systemd daemon
    ansible.builtin.systemd:
      daemon_reload: yes

  - name: Restart cloudflare_ddns services
    ansible.builtin.systemd:
      name: "{{ item }}"
      state: restarted
    loop: "{{ systemd_services }}"
