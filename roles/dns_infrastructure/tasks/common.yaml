---
# Common setup tasks for DNS infrastructure

- name: Wait for cloud-init to complete
  ansible.builtin.command: cloud-init status --wait
  changed_when: false

- name: Wait for dpkg lock to be released
  ansible.builtin.include_tasks: ../../../../playbooks/tasks/dpkg_lock.yaml

- name: Stop and disable systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: stopped
    enabled: false
  failed_when: false

- name: Configure resolv.conf for static DNS
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      nameserver {{ ha_peer_ip }}
      nameserver 1.1.1.1
      search {{ dns_domain }}
    mode: '0644'

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - sqlite3
    state: present
    update_cache: true

- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker CE packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure /etc/docker directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: '0755'

- name: Configure Docker daemon
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "journald"
      }
    mode: '0644'

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
    daemon_reload: true

- name: Create service directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ dns_home }}"
    - "{{ dns_home }}/config"
    - "{{ dns_home }}/data/pdns"
    - "{{ dns_home }}/data/kea"
    - "{{ dns_home }}/data/netboot/config"
    - "{{ dns_home }}/data/netboot/assets"
