---
# Kea DHCP deployment tasks

- name: Deploy Kea DHCP4 configuration
  ansible.builtin.template:
    src: kea/kea-dhcp4.conf.j2
    dest: "{{ dns_home }}/config/kea-dhcp4.conf"
    mode: '0644'
  notify: Restart dns-stack

- name: Deploy Kea DHCP-DDNS configuration
  ansible.builtin.template:
    src: kea/kea-dhcp-ddns.conf.j2
    dest: "{{ dns_home }}/config/kea-dhcp-ddns.conf"
    mode: '0644'
  notify: Restart dns-stack

- name: Deploy Kea Control Agent configuration
  ansible.builtin.template:
    src: kea/kea-ctrl-agent.conf.j2
    dest: "{{ dns_home }}/config/kea-ctrl-agent.conf"
    mode: '0644'
  notify: Restart dns-stack
