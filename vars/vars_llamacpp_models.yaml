# llamacpp Model Configuration for RTX 3090 (24GB VRAM)
# Optimized for single-user reasoning with max context in 16GB VRAM budget

# The one model actually loaded at runtime. Single source of truth: the deploy
# downloads ONLY this file (skipped if already present) and docker-compose loads
# it via --model. Change this one value to switch models.
llamacpp_active_model: "Qwen3.6-35B-A3B-UD-IQ4_NL.gguf"

llamacpp_models:
  reasoning:
    # Active model: MoE 35B / ~3B active, native tool-calling, ~100 tok/s on a
    # 3090. IQ4_NL (18GB) over Q4_K_M (22.1GB) to leave VRAM for q8_0 KV @ 32K.
    # Verify HF card + a coding leaderboard at deploy (released 2026-04-15).
    - name: "Qwen3.6-35B-A3B-UD-IQ4_NL.gguf"
      url: "https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-IQ4_NL.gguf"
      size: "18GB"
      parameters: "35B-A3B (MoE, ~3B active)"
      vram_usage: "~18GB + q8_0 KV cache (fits 24GB)"
      capabilities: ["agentic-coding", "tool-calling", "reasoning", "thinking", "repo-level"]
      context_size: "32K"
      timeout: 7200
      priority: 1
      requires_auth: false
      benchmark_eligible: true

    - name: "Qwen3-14B-Q4_K_M.gguf"
      url: "https://huggingface.co/unsloth/Qwen3-14B-GGUF/resolve/main/Qwen3-14B-Q4_K_M.gguf"
      size: "8.5GB"
      parameters: "14B"
      vram_usage: "~9GB base + KV cache"
      capabilities: ["reasoning", "thinking", "step-by-step", "analysis", "math", "coding"]
      context_size: "40K"
      timeout: 3600
      priority: 3
      requires_auth: false
      benchmark_eligible: true

    - name: "Qwen3-8B-Q4_K_M.gguf"
      url: "https://huggingface.co/unsloth/Qwen3-8B-GGUF/resolve/main/Qwen3-8B-Q4_K_M.gguf"
      size: "5.0GB"
      parameters: "8B"
      vram_usage: "~6GB base + KV cache"
      capabilities: ["reasoning", "thinking", "general", "analysis", "coding"]
      context_size: "64K"
      timeout: 2400
      priority: 2
      requires_auth: false
      benchmark_eligible: true

  backup:
    - name: "DeepSeek-R1-Distill-Qwen-7B-Q4_K_M.gguf"
      url: "https://huggingface.co/deepseek-ai/DeepSeek-R1-Distill-Qwen-7B-GGUF/resolve/main/DeepSeek-R1-Distill-Qwen-7B-Q4_K_M.gguf"
      size: "4GB"
      parameters: "7B"
      vram_usage: "~5GB"
      capabilities: ["reasoning", "basic", "fast"]
      context_size: "16K"
      timeout: 1800
      priority: 4
      requires_auth: false
      benchmark_eligible: true

# RTX 3090 Performance Profiles (16GB VRAM budget for headroom)
rtx_3090_profiles:
  # Active profile. q8_0 KV (needs flash-attn) keeps 32K context inside 24GB
  # alongside the 18GB model. --jinja enables the model's tool-call template.
  single_user_agentic:
    model: "Qwen3.6-35B-A3B-UD-IQ4_NL.gguf"
    gpu_layers: -1
    context_size: 32768
    batch_size: 2048
    parallel_requests: 1
    flash_attention: true
    thinking_mode: true
    cache_type: q8_0

  single_user_reasoning:
    model: "Qwen3-14B-Q4_K_M.gguf"
    gpu_layers: -1
    context_size: 40960
    batch_size: 2048
    parallel_requests: 1
    flash_attention: true
    thinking_mode: true

  max_context:
    model: "Qwen3-8B-Q4_K_M.gguf"
    gpu_layers: -1
    context_size: 65536
    batch_size: 2048
    parallel_requests: 1
    flash_attention: true
    thinking_mode: true

  lightweight:
    model: "DeepSeek-R1-Distill-Qwen-7B-Q4_K_M.gguf"
    gpu_layers: -1
    context_size: 32768
    batch_size: 1024
    parallel_requests: 1
    flash_attention: true

# Model download priorities (1 = download first)
download_priority:
  1: "Qwen3.6-35B-A3B-UD-IQ4_NL.gguf"
  2: "Qwen3-8B-Q4_K_M.gguf"
  3: "Qwen3-14B-Q4_K_M.gguf"
  4: "DeepSeek-R1-Distill-Qwen-7B-Q4_K_M.gguf"
